name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  # ── Python test suite ───────────────────────────────────────────────────────
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentmem
          POSTGRES_PASSWORD: agentmem
          POSTGRES_DB: agentmem
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentmem"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem
      TEST_DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem
      REDIS_URL: redis://localhost:6379/0
      EMBEDDING_PROVIDER: local
      MASTER_ENCRYPTION_KEY: ""
      AGENTMEM_ALLOW_UNENCRYPTED: "true"
      ADMIN_SECRET: ci-admin-secret
      RECALL_CACHE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: .

      - name: Run Alembic migrations
        run: alembic upgrade head
        working-directory: agentmem
        env:
          DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem

      - name: Run pytest
        run: python -m pytest agentmem/tests/ -v --tb=short
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem

  # ── TypeScript SDK tests ────────────────────────────────────────────────────
  typescript:
    name: TypeScript SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: agentmem/sdk/typescript/package.json

      - name: Install dependencies
        run: npm install
        working-directory: agentmem/sdk/typescript

      - name: Run Jest tests
        run: npm test
        working-directory: agentmem/sdk/typescript
