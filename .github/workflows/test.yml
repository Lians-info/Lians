name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  # ── Python test suite ───────────────────────────────────────────────────────
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentmem
          POSTGRES_PASSWORD: agentmem
          POSTGRES_DB: agentmem
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentmem"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem
      TEST_DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem
      REDIS_URL: redis://localhost:6379/0
      EMBEDDING_PROVIDER: local
      MASTER_ENCRYPTION_KEY: ""
      AGENTMEM_ALLOW_UNENCRYPTED: "true"
      ADMIN_SECRET: dev-admin-secret-change-in-prod
      RECALL_CACHE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: .

      - name: Run Alembic migrations
        run: alembic upgrade head
        working-directory: agentmem
        env:
          DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem

      - name: Run pytest
        run: python -m pytest agentmem/tests/ -v --tb=short
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://agentmem:agentmem@localhost:5432/agentmem

  # ── TypeScript SDK tests ────────────────────────────────────────────────────
  typescript:
    name: TypeScript SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: agentmem/sdk/typescript/package.json

      - name: Install dependencies
        run: npm install
        working-directory: agentmem/sdk/typescript

      - name: Run Jest tests
        run: npm test
        working-directory: agentmem/sdk/typescript

  # ── Java SDK tests ──────────────────────────────────────────────────────────
  java:
    name: Java SDK (Temurin ${{ matrix.java-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: ["11", "17", "21"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build & test
        run: mvn -B --no-transfer-progress verify
        working-directory: agentmem/sdk/java

  # ── C SDK tests ─────────────────────────────────────────────────────────────
  c:
    name: C SDK (CMake)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install libcurl dev headers
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        working-directory: agentmem/sdk/c

      - name: Build
        run: cmake --build build
        working-directory: agentmem/sdk/c

      - name: Test (pure helpers)
        run: ctest --test-dir build --output-on-failure
        working-directory: agentmem/sdk/c

  # ── Go SDK tests ────────────────────────────────────────────────────────────
  go:
    name: Go SDK (${{ matrix.go-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...
        working-directory: agentmem/sdk/go

      - name: Test
        run: go test ./...
        working-directory: agentmem/sdk/go
