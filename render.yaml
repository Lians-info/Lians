services:
  - type: web
    name: agentmem-api
    runtime: python
    plan: starter
    region: oregon
    branch: master
    buildCommand: pip install -e ".[otel]"
    preDeployCommand: alembic -c agentmem/alembic.ini upgrade head
    startCommand: uvicorn agentmem.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentmem-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agentmem-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_PROVIDER
        value: local
      - key: EMBEDDING_DIM
        value: "1024"
      - key: SUPERSESSION_LLM_STAGE
        value: "false"
      - key: SUPERSESSION_REVIEW_THRESHOLD
        value: "0.75"
      - key: RECALL_CACHE_ENABLED
        value: "true"
      - key: RECALL_CACHE_TTL_SECONDS
        value: "60"
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: API_SECRET_SEED
        generateValue: true
      - key: OTEL_SERVICE_NAME
        value: agentmem
      - key: PYTHONPATH
        value: agentmem/src

  - type: redis
    name: agentmem-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: agentmem-pg
    plan: basic_256mb
    region: oregon
    databaseName: agentmem
    user: agentmem
